services:
  db:
    image: postgis/postgis:16-3.4
    container_name: tendr-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tendr
      POSTGRES_PASSWORD: tendr_dev
      POSTGRES_DB: tendr
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tendr -d tendr"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tendr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres-data:
